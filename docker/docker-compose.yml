services:
  mongodb:
    image: mongo:7.0.31-jammy
    container_name: mongodb
    
    ports:
      - "27007:27017"

    volumes:
      - mongodatabase:/data/db

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

    networks:
      - backend

    restart: always

networks:
  backend:

volumes:
  mongodatabase:
